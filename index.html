<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Проект «Грозный» — трекер изменений</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #0D0F14; }
    button, input, select, textarea { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
const { useState, useEffect } = React;

const CATEGORIES = {
  content: {
    label: "Контент",
    color: "#E85D04",
    icon: "📝",
    subcategories: ["Сценарий", "Текст/Копирайт", "Фото", "Видео", "Аудио", "3D/Анимация", "Иллюстрации", "Перевод"]
  },
  engineering: {
    label: "Инженерия",
    color: "#0077B6",
    icon: "⚙️",
    subcategories: ["Интерактив", "Верстка", "Backend", "CMS", "Видеопроигрыватель", "Аудиосистема", "AR/VR", "Тестирование"]
  },
  management: {
    label: "Управление",
    color: "#7B2D8B",
    icon: "📊",
    subcategories: ["Бюджет", "Команда", "Дедлайны", "Согласование", "Риски", "Клиент"]
  }
};

const STATUSES = {
  planned: { label: "Запланировано", color: "#6B7280", bg: "#F3F4F6" },
  inprogress: { label: "В работе", color: "#0077B6", bg: "#EFF6FF" },
  review: { label: "На проверке", color: "#D97706", bg: "#FFFBEB" },
  done: { label: "Выполнено", color: "#059669", bg: "#ECFDF5" },
  blocked: { label: "Заблокировано", color: "#DC2626", bg: "#FEF2F2" },
  changed: { label: "Изменено", color: "#7B2D8B", bg: "#F5F3FF" }
};

const PRIORITIES = {
  critical: { label: "Критично", color: "#DC2626" },
  high: { label: "Высокий", color: "#EA580C" },
  medium: { label: "Средний", color: "#D97706" },
  low: { label: "Низкий", color: "#6B7280" }
};

// Стартовые данные на основе паспорта проекта "Грозный"
const INITIAL_WEEKS = (() => {
  const start = new Date("2025-01-06");
  const weeks = [];
  for (let i = 0; i < 24; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i * 7);
    const end = new Date(d);
    end.setDate(d.getDate() + 6);
    weeks.push({
      id: i + 1,
      label: `Неделя ${i + 1}`,
      start: d.toISOString().slice(0, 10),
      end: end.toISOString().slice(0, 10),
    });
  }
  return weeks;
})();

const SAMPLE_CHANGES = [
  { id: 1, week: 1, date: "2025-01-06", category: "content", subcategory: "Сценарий", title: "Утверждение концепции", description: "Согласован финальный нарратив проекта. 5 глав + пролог.", status: "done", priority: "critical", author: "Продюсер", impact: "Определяет структуру всего контента", tags: ["концепция", "нарратив"] },
  { id: 2, week: 2, date: "2025-01-13", category: "engineering", subcategory: "Интерактив", title: "Выбор технологического стека", description: "Решено использовать Three.js для 3D-элементов, GSAP для анимаций.", status: "done", priority: "critical", author: "Тех. директор", impact: "Влияет на все интерактивные модули", tags: ["three.js", "gsap"] },
  { id: 3, week: 3, date: "2025-01-20", category: "content", subcategory: "Видео", title: "Изменение хронометража видеоблоков", description: "Видео сокращены с 3 до 1.5 минут по требованию заказчика.", status: "changed", priority: "high", author: "Режиссёр", impact: "Пересмотр монтажа всех 12 видео", tags: ["видео", "хронометраж"] },
  { id: 4, week: 4, date: "2025-01-27", category: "management", subcategory: "Бюджет", title: "Корректировка бюджета на 3D", description: "Увеличение бюджета 3D-анимации на 15% из-за сложности сцен.", status: "review", priority: "high", author: "Продюсер", impact: "Перераспределение статей бюджета", tags: ["бюджет", "3d"] },
  { id: 5, week: 5, date: "2025-02-03", category: "engineering", subcategory: "Backend", title: "Смена хостинг-провайдера", description: "Переход с AWS на Яндекс.Облако по требованию заказчика.", status: "inprogress", priority: "critical", author: "Девелопер", impact: "Миграция всей инфраструктуры", tags: ["хостинг", "инфраструктура"] },
  { id: 6, week: 6, date: "2025-02-10", category: "content", subcategory: "Фото", title: "Дополнительная фотосъёмка", description: "Добавлена съёмка интерьеров 3 объектов в Грозном.", status: "done", priority: "medium", author: "Фотограф", impact: "800+ новых фото в архиве", tags: ["фото", "съёмка"] },
];

function formatDate(d) {
  if (!d) return "";
  const [y, m, day] = d.split("-");
  return `${day}.${m}.${y}`;
}

function getWeekForDate(dateStr, weeks) {
  for (const w of weeks) {
    if (dateStr >= w.start && dateStr <= w.end) return w.id;
  }
  return null;
}

function ProjectTracker() {
  const [changes, setChanges] = useState(SAMPLE_CHANGES);
  const [weeks] = useState(INITIAL_WEEKS);
  const [view, setView] = useState("timeline"); // timeline | log | dashboard
  const [filterCat, setFilterCat] = useState("all");
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterWeek, setFilterWeek] = useState("all");
  const [search, setSearch] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [expandedWeeks, setExpandedWeeks] = useState(new Set([1, 2, 3, 4, 5, 6]));
  const [form, setForm] = useState({
    date: new Date().toISOString().slice(0, 10),
    category: "content",
    subcategory: "",
    title: "",
    description: "",
    status: "planned",
    priority: "medium",
    author: "",
    impact: "",
    tags: ""
  });

  const today = new Date().toISOString().slice(0, 10);
  const currentWeekId = getWeekForDate(today, weeks) || weeks[0].id;

  const filtered = changes.filter(c => {
    if (filterCat !== "all" && c.category !== filterCat) return false;
    if (filterStatus !== "all" && c.status !== filterStatus) return false;
    if (filterWeek !== "all" && c.week !== Number(filterWeek)) return false;
    if (search && !c.title.toLowerCase().includes(search.toLowerCase()) &&
        !c.description.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const changesByWeek = {};
  filtered.forEach(c => {
    if (!changesByWeek[c.week]) changesByWeek[c.week] = [];
    changesByWeek[c.week].push(c);
  });

  const stats = {
    total: changes.length,
    done: changes.filter(c => c.status === "done").length,
    inprogress: changes.filter(c => c.status === "inprogress").length,
    blocked: changes.filter(c => c.status === "blocked").length,
    changed: changes.filter(c => c.status === "changed").length,
    critical: changes.filter(c => c.priority === "critical").length,
  };

  function submitForm() {
    if (!form.title || !form.date) return;
    const weekId = getWeekForDate(form.date, weeks) || 1;
    if (editItem) {
      setChanges(prev => prev.map(c => c.id === editItem.id
        ? { ...c, ...form, week: weekId, tags: form.tags.split(",").map(t => t.trim()).filter(Boolean) }
        : c));
    } else {
      const newId = Math.max(0, ...changes.map(c => c.id)) + 1;
      setChanges(prev => [...prev, {
        ...form,
        id: newId,
        week: weekId,
        tags: form.tags.split(",").map(t => t.trim()).filter(Boolean)
      }]);
    }
    setShowForm(false);
    setEditItem(null);
    setForm({ date: today, category: "content", subcategory: "", title: "", description: "", status: "planned", priority: "medium", author: "", impact: "", tags: "" });
  }

  function startEdit(item) {
    setEditItem(item);
    setForm({ ...item, tags: (item.tags || []).join(", ") });
    setShowForm(true);
  }

  function deleteChange(id) {
    setChanges(prev => prev.filter(c => c.id !== id));
  }

  function toggleWeek(id) {
    setExpandedWeeks(prev => {
      const s = new Set(prev);
      s.has(id) ? s.delete(id) : s.add(id);
      return s;
    });
  }

  const catByCat = {};
  Object.keys(CATEGORIES).forEach(k => {
    catByCat[k] = changes.filter(c => c.category === k).length;
  });

  return (
    <div style={{ fontFamily: "'IBM Plex Sans', 'Segoe UI', sans-serif", minHeight: "100vh", background: "#0D0F14", color: "#E8EAF0" }}>
      {/* HEADER */}
      <div style={{ background: "linear-gradient(135deg, #1A1D2E 0%, #0D0F14 100%)", borderBottom: "1px solid #2A2D40", padding: "20px 32px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 8, height: 40, background: "linear-gradient(180deg, #E85D04, #0077B6)", borderRadius: 4 }} />
              <div>
                <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: "-0.5px", color: "#fff" }}>
                  ПРОЕКТ «ГРОЗНЫЙ»
                </div>
                <div style={{ fontSize: 12, color: "#6B7280", letterSpacing: 2, textTransform: "uppercase" }}>
                  Мультимедиа · Трекер изменений
                </div>
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            {["timeline", "log", "dashboard"].map(v => (
              <button key={v} onClick={() => setView(v)} style={{
                padding: "8px 18px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 13, fontWeight: 600,
                background: view === v ? "#E85D04" : "#1A1D2E",
                color: view === v ? "#fff" : "#9CA3AF",
                transition: "all 0.2s"
              }}>
                {{ timeline: "⏱ Шкала", log: "📋 Журнал", dashboard: "📊 Дашборд" }[v]}
              </button>
            ))}
            <button onClick={() => { setEditItem(null); setShowForm(true); }} style={{
              padding: "8px 18px", borderRadius: 8, border: "none", cursor: "pointer",
              background: "#059669", color: "#fff", fontWeight: 700, fontSize: 13
            }}>
              + Добавить
            </button>
          </div>
        </div>

        {/* STATS BAR */}
        <div style={{ display: "flex", gap: 16, marginTop: 20, flexWrap: "wrap" }}>
          {[
            { label: "Всего изменений", value: stats.total, color: "#6B7280" },
            { label: "Выполнено", value: stats.done, color: "#059669" },
            { label: "В работе", value: stats.inprogress, color: "#0077B6" },
            { label: "Заблокировано", value: stats.blocked, color: "#DC2626" },
            { label: "Изменения", value: stats.changed, color: "#7B2D8B" },
            { label: "Критичных", value: stats.critical, color: "#E85D04" },
          ].map(s => (
            <div key={s.label} style={{ background: "#1A1D2E", borderRadius: 10, padding: "10px 16px", borderLeft: `3px solid ${s.color}`, minWidth: 100 }}>
              <div style={{ fontSize: 22, fontWeight: 700, color: s.color }}>{s.value}</div>
              <div style={{ fontSize: 11, color: "#6B7280", marginTop: 2 }}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* FILTERS */}
      <div style={{ padding: "16px 32px", background: "#12141F", borderBottom: "1px solid #2A2D40", display: "flex", gap: 12, flexWrap: "wrap", alignItems: "center" }}>
        <input
          placeholder="🔍 Поиск по изменениям..."
          value={search}
          onChange={e => setSearch(e.target.value)}
          style={{ padding: "8px 14px", borderRadius: 8, border: "1px solid #2A2D40", background: "#1A1D2E", color: "#E8EAF0", fontSize: 13, width: 220 }}
        />
        <select value={filterCat} onChange={e => setFilterCat(e.target.value)}
          style={{ padding: "8px 12px", borderRadius: 8, border: "1px solid #2A2D40", background: "#1A1D2E", color: "#E8EAF0", fontSize: 13 }}>
          <option value="all">Все категории</option>
          {Object.entries(CATEGORIES).map(([k, v]) => <option key={k} value={k}>{v.icon} {v.label}</option>)}
        </select>
        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}
          style={{ padding: "8px 12px", borderRadius: 8, border: "1px solid #2A2D40", background: "#1A1D2E", color: "#E8EAF0", fontSize: 13 }}>
          <option value="all">Все статусы</option>
          {Object.entries(STATUSES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
        </select>
        <select value={filterWeek} onChange={e => setFilterWeek(e.target.value)}
          style={{ padding: "8px 12px", borderRadius: 8, border: "1px solid #2A2D40", background: "#1A1D2E", color: "#E8EAF0", fontSize: 13 }}>
          <option value="all">Все недели</option>
          {weeks.map(w => <option key={w.id} value={w.id}>{w.label} ({formatDate(w.start)})</option>)}
        </select>
        <span style={{ fontSize: 12, color: "#6B7280", marginLeft: "auto" }}>
          Найдено: {filtered.length} изменений
        </span>
      </div>

      {/* MAIN CONTENT */}
      <div style={{ padding: "24px 32px" }}>

        {/* ====== TIMELINE VIEW ====== */}
        {view === "timeline" && (
          <div>
            {weeks.filter(w => filterWeek === "all" || w.id === Number(filterWeek)).map(week => {
              const wChanges = changesByWeek[week.id] || [];
              const isExpanded = expandedWeeks.has(week.id);
              const isCurrent = week.id === currentWeekId;
              const isPast = week.end < today;

              return (
                <div key={week.id} style={{ marginBottom: 8 }}>
                  {/* Week Header */}
                  <div onClick={() => toggleWeek(week.id)} style={{
                    display: "flex", alignItems: "center", gap: 12, cursor: "pointer",
                    padding: "12px 16px", borderRadius: 10,
                    background: isCurrent ? "linear-gradient(90deg, #1A2A1A, #1A1D2E)" : "#1A1D2E",
                    border: isCurrent ? "1px solid #059669" : "1px solid #2A2D40",
                    transition: "all 0.2s"
                  }}>
                    <div style={{
                      width: 28, height: 28, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center",
                      background: isCurrent ? "#059669" : isPast ? "#2A2D40" : "#1A1D2E",
                      border: `2px solid ${isCurrent ? "#059669" : isPast ? "#4B5563" : "#2A2D40"}`,
                      fontSize: 11, fontWeight: 700, color: isCurrent ? "#fff" : "#6B7280"
                    }}>
                      {week.id}
                    </div>
                    <div style={{ flex: 1 }}>
                      <span style={{ fontWeight: 600, fontSize: 14, color: isCurrent ? "#6EE7A0" : "#E8EAF0" }}>
                        {week.label}
                        {isCurrent && <span style={{ marginLeft: 8, fontSize: 10, background: "#059669", color: "#fff", padding: "2px 8px", borderRadius: 20, verticalAlign: "middle" }}>ТЕКУЩАЯ</span>}
                      </span>
                      <span style={{ marginLeft: 12, fontSize: 12, color: "#6B7280" }}>
                        {formatDate(week.start)} — {formatDate(week.end)}
                      </span>
                    </div>
                    {/* Mini category pills */}
                    <div style={{ display: "flex", gap: 4 }}>
                      {Object.entries(CATEGORIES).map(([k, v]) => {
                        const cnt = wChanges.filter(c => c.category === k).length;
                        if (!cnt) return null;
                        return <span key={k} style={{ fontSize: 11, padding: "2px 8px", borderRadius: 20, background: v.color + "22", color: v.color, fontWeight: 600 }}>{v.icon} {cnt}</span>;
                      })}
                      {!wChanges.length && <span style={{ fontSize: 11, color: "#4B5563" }}>— нет изменений</span>}
                    </div>
                    <span style={{ color: "#6B7280", fontSize: 14 }}>{isExpanded ? "▲" : "▼"}</span>
                  </div>

                  {/* Week Changes */}
                  {isExpanded && wChanges.length > 0 && (
                    <div style={{ marginLeft: 24, marginTop: 4, display: "flex", flexDirection: "column", gap: 6 }}>
                      {wChanges.map(c => <ChangeCard key={c.id} item={c} onEdit={startEdit} onDelete={deleteChange} />)}
                    </div>
                  )}
                  {isExpanded && !wChanges.length && (
                    <div style={{ marginLeft: 24, marginTop: 4, padding: "12px 16px", background: "#12141F", borderRadius: 8, fontSize: 13, color: "#4B5563", borderLeft: "2px solid #2A2D40" }}>
                      Изменений на этой неделе нет
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* ====== LOG VIEW ====== */}
        {view === "log" && (
          <div>
            <div style={{ display: "grid", gap: 10 }}>
              {[...filtered].sort((a, b) => b.date.localeCompare(a.date)).map(c =>
                <ChangeCard key={c.id} item={c} onEdit={startEdit} onDelete={deleteChange} showWeek />
              )}
              {!filtered.length && (
                <div style={{ textAlign: "center", padding: 60, color: "#4B5563" }}>
                  Нет изменений по выбранным фильтрам
                </div>
              )}
            </div>
          </div>
        )}

        {/* ====== DASHBOARD VIEW ====== */}
        {view === "dashboard" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
            {/* By category */}
            <div style={{ background: "#1A1D2E", borderRadius: 12, padding: 20, border: "1px solid #2A2D40" }}>
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 16, color: "#E8EAF0" }}>По категориям</div>
              {Object.entries(CATEGORIES).map(([k, v]) => {
                const cnt = changes.filter(c => c.category === k).length;
                const pct = changes.length ? Math.round(cnt / changes.length * 100) : 0;
                return (
                  <div key={k} style={{ marginBottom: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                      <span style={{ fontSize: 13 }}>{v.icon} {v.label}</span>
                      <span style={{ fontSize: 13, fontWeight: 600, color: v.color }}>{cnt}</span>
                    </div>
                    <div style={{ height: 6, background: "#2A2D40", borderRadius: 3 }}>
                      <div style={{ height: 6, background: v.color, borderRadius: 3, width: `${pct}%`, transition: "width 0.5s" }} />
                    </div>
                  </div>
                );
              })}
            </div>

            {/* By status */}
            <div style={{ background: "#1A1D2E", borderRadius: 12, padding: 20, border: "1px solid #2A2D40" }}>
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 16, color: "#E8EAF0" }}>По статусам</div>
              {Object.entries(STATUSES).map(([k, v]) => {
                const cnt = changes.filter(c => c.status === k).length;
                const pct = changes.length ? Math.round(cnt / changes.length * 100) : 0;
                return (
                  <div key={k} style={{ marginBottom: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                      <span style={{ fontSize: 13 }}>{v.label}</span>
                      <span style={{ fontSize: 13, fontWeight: 600, color: v.color }}>{cnt}</span>
                    </div>
                    <div style={{ height: 6, background: "#2A2D40", borderRadius: 3 }}>
                      <div style={{ height: 6, background: v.color, borderRadius: 3, width: `${pct}%`, transition: "width 0.5s" }} />
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Priority */}
            <div style={{ background: "#1A1D2E", borderRadius: 12, padding: 20, border: "1px solid #2A2D40" }}>
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 16, color: "#E8EAF0" }}>По приоритету</div>
              {Object.entries(PRIORITIES).map(([k, v]) => {
                const cnt = changes.filter(c => c.priority === k).length;
                return (
                  <div key={k} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: "1px solid #2A2D40" }}>
                    <span style={{ fontSize: 13, color: v.color, fontWeight: 600 }}>● {v.label}</span>
                    <span style={{ fontSize: 22, fontWeight: 700, color: v.color }}>{cnt}</span>
                  </div>
                );
              })}
            </div>

            {/* Recent changes */}
            <div style={{ background: "#1A1D2E", borderRadius: 12, padding: 20, border: "1px solid #2A2D40" }}>
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 16, color: "#E8EAF0" }}>Последние изменения</div>
              {[...changes].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 5).map(c => (
                <div key={c.id} style={{ display: "flex", gap: 10, padding: "8px 0", borderBottom: "1px solid #2A2D40" }}>
                  <span style={{ fontSize: 18 }}>{CATEGORIES[c.category]?.icon}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{c.title}</div>
                    <div style={{ fontSize: 11, color: "#6B7280" }}>{formatDate(c.date)} · Нед. {c.week}</div>
                  </div>
                  <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 20, background: STATUSES[c.status]?.bg, color: STATUSES[c.status]?.color, alignSelf: "center", whiteSpace: "nowrap" }}>
                    {STATUSES[c.status]?.label}
                  </span>
                </div>
              ))}
            </div>

            {/* Analysis block */}
            <div style={{ gridColumn: "1/-1", background: "linear-gradient(135deg, #1A1D2E, #12141F)", borderRadius: 12, padding: 24, border: "1px solid #E85D04", borderLeft: "4px solid #E85D04" }}>
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 12, color: "#E85D04" }}>⚠ Анализ текущего состояния</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
                {[
                  { issue: "Изменения без описания влияния", count: changes.filter(c => !c.impact).length, severity: "high" },
                  { issue: "Блокирующих задач", count: changes.filter(c => c.status === "blocked").length, severity: "critical" },
                  { issue: "Незавершённых критичных", count: changes.filter(c => c.priority === "critical" && c.status !== "done").length, severity: "high" },
                ].map(a => (
                  <div key={a.issue} style={{ background: "#0D0F14", borderRadius: 8, padding: 16 }}>
                    <div style={{ fontSize: 28, fontWeight: 700, color: a.severity === "critical" ? "#DC2626" : "#E85D04" }}>{a.count}</div>
                    <div style={{ fontSize: 12, color: "#9CA3AF", marginTop: 4 }}>{a.issue}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* MODAL FORM */}
      {showForm && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 24 }}>
          <div style={{ background: "#1A1D2E", borderRadius: 16, padding: 32, width: "100%", maxWidth: 600, border: "1px solid #2A2D40", maxHeight: "90vh", overflowY: "auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 24 }}>
              <div style={{ fontWeight: 700, fontSize: 18 }}>{editItem ? "✏️ Редактировать изменение" : "➕ Новое изменение"}</div>
              <button onClick={() => { setShowForm(false); setEditItem(null); }} style={{ background: "none", border: "none", color: "#6B7280", fontSize: 20, cursor: "pointer" }}>✕</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              {[
                { label: "Дата *", key: "date", type: "date" },
                { label: "Автор", key: "author", type: "text", placeholder: "Имя или роль" },
              ].map(f => (
                <div key={f.key}>
                  <label style={{ fontSize: 12, color: "#9CA3AF", display: "block", marginBottom: 6 }}>{f.label}</label>
                  <input type={f.type} value={form[f.key]} placeholder={f.placeholder}
                    onChange={e => setForm(p => ({ ...p, [f.key]: e.target.value }))}
                    style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #2A2D40", background: "#0D0F14", color: "#E8EAF0", fontSize: 13, boxSizing: "border-box" }} />
                </div>
              ))}
              <div>
                <label style={{ fontSize: 12, color: "#9CA3AF", display: "block", marginBottom: 6 }}>Категория *</label>
                <select value={form.category} onChange={e => setForm(p => ({ ...p, category: e.target.value, subcategory: "" }))}
                  style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #2A2D40", background: "#0D0F14", color: "#E8EAF0", fontSize: 13 }}>
                  {Object.entries(CATEGORIES).map(([k, v]) => <option key={k} value={k}>{v.icon} {v.label}</option>)}
                </select>
              </div>
              <div>
                <label style={{ fontSize: 12, color: "#9CA3AF", display: "block", marginBottom: 6 }}>Раздел</label>
                <select value={form.subcategory} onChange={e => setForm(p => ({ ...p, subcategory: e.target.value }))}
                  style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #2A2D40", background: "#0D0F14", color: "#E8EAF0", fontSize: 13 }}>
                  <option value="">— выберите —</option>
                  {(CATEGORIES[form.category]?.subcategories || []).map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div>
                <label style={{ fontSize: 12, color: "#9CA3AF", display: "block", marginBottom: 6 }}>Статус</label>
                <select value={form.status} onChange={e => setForm(p => ({ ...p, status: e.target.value }))}
                  style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #2A2D40", background: "#0D0F14", color: "#E8EAF0", fontSize: 13 }}>
                  {Object.entries(STATUSES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                </select>
              </div>
              <div>
                <label style={{ fontSize: 12, color: "#9CA3AF", display: "block", marginBottom: 6 }}>Приоритет</label>
                <select value={form.priority} onChange={e => setForm(p => ({ ...p, priority: e.target.value }))}
                  style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #2A2D40", background: "#0D0F14", color: "#E8EAF0", fontSize: 13 }}>
                  {Object.entries(PRIORITIES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                </select>
              </div>
              <div style={{ gridColumn: "1/-1" }}>
                <label style={{ fontSize: 12, color: "#9CA3AF", display: "block", marginBottom: 6 }}>Название изменения *</label>
                <input value={form.title} placeholder="Кратко опишите изменение..."
                  onChange={e => setForm(p => ({ ...p, title: e.target.value }))}
                  style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #2A2D40", background: "#0D0F14", color: "#E8EAF0", fontSize: 13, boxSizing: "border-box" }} />
              </div>
              <div style={{ gridColumn: "1/-1" }}>
                <label style={{ fontSize: 12, color: "#9CA3AF", display: "block", marginBottom: 6 }}>Описание изменения</label>
                <textarea value={form.description} placeholder="Подробное описание..."
                  onChange={e => setForm(p => ({ ...p, description: e.target.value }))}
                  rows={3}
                  style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #2A2D40", background: "#0D0F14", color: "#E8EAF0", fontSize: 13, boxSizing: "border-box", resize: "vertical" }} />
              </div>
              <div style={{ gridColumn: "1/-1" }}>
                <label style={{ fontSize: 12, color: "#9CA3AF", display: "block", marginBottom: 6 }}>⚡ Влияние на проект</label>
                <input value={form.impact} placeholder="Что это меняет в проекте? На что влияет?"
                  onChange={e => setForm(p => ({ ...p, impact: e.target.value }))}
                  style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #2A2D40", background: "#0D0F14", color: "#E8EAF0", fontSize: 13, boxSizing: "border-box" }} />
              </div>
              <div style={{ gridColumn: "1/-1" }}>
                <label style={{ fontSize: 12, color: "#9CA3AF", display: "block", marginBottom: 6 }}>Теги (через запятую)</label>
                <input value={form.tags} placeholder="видео, монтаж, бюджет..."
                  onChange={e => setForm(p => ({ ...p, tags: e.target.value }))}
                  style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "1px solid #2A2D40", background: "#0D0F14", color: "#E8EAF0", fontSize: 13, boxSizing: "border-box" }} />
              </div>
            </div>
            <div style={{ display: "flex", gap: 12, marginTop: 24, justifyContent: "flex-end" }}>
              <button onClick={() => { setShowForm(false); setEditItem(null); }}
                style={{ padding: "10px 24px", borderRadius: 8, border: "1px solid #2A2D40", background: "transparent", color: "#9CA3AF", cursor: "pointer", fontSize: 14 }}>
                Отмена
              </button>
              <button onClick={submitForm}
                style={{ padding: "10px 24px", borderRadius: 8, border: "none", background: "#E85D04", color: "#fff", cursor: "pointer", fontWeight: 700, fontSize: 14 }}>
                {editItem ? "Сохранить" : "Добавить изменение"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ChangeCard({ item, onEdit, onDelete, showWeek }) {
  const [expanded, setExpanded] = useState(false);
  const cat = CATEGORIES[item.category];
  const status = STATUSES[item.status];
  const priority = PRIORITIES[item.priority];

  return (
    <div style={{
      background: "#12141F", borderRadius: 10, border: "1px solid #2A2D40",
      borderLeft: `3px solid ${cat?.color}`, overflow: "hidden"
    }}>
      <div style={{ padding: "14px 16px", cursor: "pointer", display: "flex", gap: 12, alignItems: "flex-start" }}
        onClick={() => setExpanded(e => !e)}>
        <span style={{ fontSize: 20, marginTop: 1 }}>{cat?.icon}</span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
            <span style={{ fontWeight: 600, fontSize: 14 }}>{item.title}</span>
            {item.subcategory && <span style={{ fontSize: 11, color: "#6B7280", background: "#1A1D2E", padding: "2px 8px", borderRadius: 20 }}>{item.subcategory}</span>}
            <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 20, background: status?.bg, color: status?.color }}>{status?.label}</span>
            <span style={{ fontSize: 10, color: priority?.color, fontWeight: 600 }}>● {priority?.label}</span>
          </div>
          <div style={{ fontSize: 12, color: "#6B7280", marginTop: 4 }}>
            {showWeek && <span style={{ marginRight: 8 }}>Нед. {item.week} ·</span>}
            {formatDate(item.date)}
            {item.author && <span> · {item.author}</span>}
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
          <button onClick={e => { e.stopPropagation(); onEdit(item); }}
            style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid #2A2D40", background: "transparent", color: "#9CA3AF", cursor: "pointer", fontSize: 12 }}>
            ✏️
          </button>
          <button onClick={e => { e.stopPropagation(); onDelete(item.id); }}
            style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid #2A2D40", background: "transparent", color: "#DC2626", cursor: "pointer", fontSize: 12 }}>
            🗑
          </button>
        </div>
      </div>
      {expanded && (
        <div style={{ padding: "0 16px 14px 48px", borderTop: "1px solid #1A1D2E" }}>
          {item.description && <div style={{ fontSize: 13, color: "#9CA3AF", marginTop: 10 }}>{item.description}</div>}
          {item.impact && (
            <div style={{ marginTop: 10, padding: "8px 12px", background: "#1A1D2E", borderRadius: 8, borderLeft: "3px solid #E85D04" }}>
              <div style={{ fontSize: 11, color: "#E85D04", fontWeight: 700, marginBottom: 4 }}>ВЛИЯНИЕ НА ПРОЕКТ</div>
              <div style={{ fontSize: 13, color: "#D1D5DB" }}>{item.impact}</div>
            </div>
          )}
          {item.tags?.length > 0 && (
            <div style={{ display: "flex", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
              {item.tags.map(t => <span key={t} style={{ fontSize: 11, padding: "2px 10px", borderRadius: 20, background: "#1A1D2E", color: "#6B7280", border: "1px solid #2A2D40" }}>#{t}</span>)}
            </div>
          )}
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<ProjectTracker />);

  </script>
</body>
</html>
